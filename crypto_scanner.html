<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Scanner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #e8e8f0; font-family: monospace; }
h1 { color: #00f5a0; font-size: 20px; margin-bottom: 4px; }
.sub { color: #6b6b80; font-size: 11px; margin-bottom: 20px; }
#scanner-view { padding: 20px; }
.controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; background: #111118; border: 1px solid #222230; padding: 12px 16px; border-radius: 10px; }
label { font-size: 11px; color: #6b6b80; margin-right: 4px; }
select { background: #1a1a24; border: 1px solid #2a2a3a; color: #e8e8f0; font-family: monospace; font-size: 12px; padding: 5px 8px; border-radius: 6px; cursor: pointer; outline: none; }
.btn { font-family: monospace; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid #2a2a3a; background: transparent; color: #6b6b80; cursor: pointer; }
.btn:hover { color: #e8e8f0; border-color: #e8e8f0; }
.btn.on { background: rgba(0,245,160,0.1); color: #00f5a0; border-color: #00f5a0; }
.refresh { font-family: monospace; font-size: 12px; padding: 6px 16px; border-radius: 6px; border: 1px solid #00f5a0; background: rgba(0,245,160,0.08); color: #00f5a0; cursor: pointer; margin-left: auto; }
.refresh:hover { background: rgba(0,245,160,0.18); }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 10px; margin-bottom: 16px; }
.mc { background: #111118; border: 1px solid #222230; border-radius: 10px; padding: 12px 14px; }
.mc-l { font-size: 10px; color: #6b6b80; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.mc-v { font-size: 24px; font-weight: bold; color: #e8e8f0; }
.mc-v.green { color: #00f5a0; }
.mc-v.sm { font-size: 12px; }
.prog-wrap { height: 2px; background: #1a1a24; border-radius: 2px; margin-bottom: 10px; }
.prog { height: 100%; width: 0%; background: #00f5a0; border-radius: 2px; transition: width 0.3s; }
.status { font-size: 11px; color: #6b6b80; margin-bottom: 12px; }
.status.loading { color: #00f5a0; }
.status.err { color: #ff4d6a; }
.table-wrap { background: #111118; border: 1px solid #222230; border-radius: 10px; overflow: hidden; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
thead { background: #1a1a24; }
th { text-align: left; padding: 10px 14px; font-size: 10px; color: #6b6b80; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; white-space: nowrap; border-bottom: 1px solid #222230; user-select: none; }
th:hover { color: #00f5a0; }
td { padding: 9px 14px; border-bottom: 1px solid #1a1a24; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.sym-link { font-weight: bold; font-size: 13px; color: #00c8ff; cursor: pointer; text-decoration: underline; }
.sym-link:hover { color: #00f5a0; }
.up { color: #00f5a0; } .dn { color: #ff4d6a; } .neu { color: #6b6b80; }
.pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: bold; }
.pg { background: rgba(0,245,160,0.12); color: #00f5a0; border: 1px solid rgba(0,245,160,0.3); }
.py { background: rgba(255,209,102,0.1); color: #ffd166; border: 1px solid rgba(255,209,102,0.3); }
.pr { background: rgba(255,77,106,0.1); color: #ff4d6a; border: 1px solid rgba(255,77,106,0.3); }
.tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 99px; margin-left: 3px; background: rgba(0,200,255,0.1); color: #00c8ff; border: 1px solid rgba(0,200,255,0.25); }
.tag-hot { background: rgba(255,77,106,0.1); color: #ff4d6a; border-color: rgba(255,77,106,0.3); }
.empty { text-align: center; padding: 40px; color: #6b6b80; }

/* CHART */
#chart-view { display: none; padding: 20px; }
.chart-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.back-btn { font-family: monospace; font-size: 12px; padding: 6px 14px; border-radius: 6px; border: 1px solid #2a2a3a; background: transparent; color: #6b6b80; cursor: pointer; }
.back-btn:hover { color: #e8e8f0; border-color: #e8e8f0; }
.chart-sym { font-size: 22px; font-weight: bold; color: #00f5a0; }
.chart-price { font-size: 18px; color: #e8e8f0; }
.chart-chg { font-size: 14px; }
.tf-btns { display: flex; gap: 4px; margin-left: auto; }
.tf-btn { font-family: monospace; font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #2a2a3a; background: transparent; color: #6b6b80; cursor: pointer; }
.tf-btn:hover { color: #e8e8f0; }
.tf-btn.on { background: rgba(0,245,160,0.1); color: #00f5a0; border-color: #00f5a0; }
.tool-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.tool-btn { font-family: monospace; font-size: 11px; padding: 4px 12px; border-radius: 6px; border: 1px solid #2a2a3a; background: transparent; color: #6b6b80; cursor: pointer; }
.tool-btn:hover { color: #e8e8f0; border-color: #e8e8f0; }
.tool-btn.on { background: rgba(0,200,255,0.1); color: #00c8ff; border-color: #00c8ff; }
.tool-btn.red { color: #ff4d6a; border-color: rgba(255,77,106,0.4); background: rgba(255,77,106,0.08); }
.legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; margin-bottom: 8px; }
.leg-item { display: flex; align-items: center; gap: 5px; }
.leg-line { width: 18px; height: 2px; border-radius: 1px; }
.div-badge { display: none; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: bold; }
.div-bull { background: rgba(0,245,160,0.15); color: #00f5a0; border: 1px solid rgba(0,245,160,0.4); }
.div-bear { background: rgba(255,77,106,0.15); color: #ff4d6a; border: 1px solid rgba(255,77,106,0.4); }
#main-chart-container { background: #111118; border: 1px solid #222230; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
#vol-chart-container { background: #111118; border: 1px solid #222230; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
#rsi-chart-container { background: #111118; border: 1px solid #222230; border-radius: 10px; margin-bottom: 8px; overflow: hidden; position: relative; }
.rsi-label { position: absolute; top: 6px; left: 10px; font-size: 10px; color: #6b6b80; z-index: 5; pointer-events: none; }
.loading-chart { text-align: center; padding: 60px; color: #6b6b80; font-size: 13px; }
</style>
</head>
<body>

<div id="scanner-view">
  <div style="padding:20px 20px 0">
    <h1>TREND SCAN</h1>
    <div class="sub">HH / HL Scanner — Binance Live · 종목 클릭시 차트</div>
  </div>
  <div style="padding:0 20px 20px">
    <div class="controls">
      <label>타임프레임</label>
      <select id="tf">
        <option value="1w">주봉 (1W)</option>
        <option value="1M">월봉 (1M)</option>
        <option value="3d">3일봉</option>
        <option value="1d">일봉 (1D)</option>
      </select>
      <label>최소거래량</label>
      <select id="minvol">
        <option value="100">$100M+</option>
        <option value="50" selected>$50M+</option>
        <option value="10">$10M+</option>
        <option value="1">$1M+</option>
      </select>
      <label>필터</label>
      <button class="btn on" id="btn-hl">HH·HL</button>
      <button class="btn" id="btn-trend">추세만</button>
      <button class="btn" id="btn-all">전체</button>
      <button class="refresh" id="btn-refresh">새로고침</button>
    </div>
    <div class="metrics">
      <div class="mc"><div class="mc-l">스캔 종목</div><div class="mc-v" id="m1">-</div></div>
      <div class="mc"><div class="mc-l">HH·HL 충족</div><div class="mc-v green" id="m2">-</div></div>
      <div class="mc"><div class="mc-l">강한 추세</div><div class="mc-v" id="m3">-</div></div>
      <div class="mc"><div class="mc-l">거래량 스파이크</div><div class="mc-v" id="m4">-</div></div>
      <div class="mc"><div class="mc-l">업데이트</div><div class="mc-v sm" id="m5">-</div></div>
    </div>
    <div class="prog-wrap"><div class="prog" id="prog"></div></div>
    <div class="status" id="st">불러오는 중...</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-key="sym">종목</th>
            <th data-key="price">현재가</th>
            <th data-key="chg">24h 등락</th>
            <th data-key="hl">HH·HL</th>
            <th data-key="trend">추세</th>
            <th data-key="vol">거래량</th>
            <th>신호</th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="chart-view">
  <div class="chart-header">
    <button class="back-btn" id="back-btn">← 목록</button>
    <span class="chart-sym" id="c-sym">-</span>
    <span class="chart-price" id="c-price">-</span>
    <span class="chart-chg" id="c-chg">-</span>
    <div class="tf-btns">
      <button class="tf-btn" data-tf="1h">1H</button>
      <button class="tf-btn" data-tf="4h">4H</button>
      <button class="tf-btn" data-tf="1d">1D</button>
      <button class="tf-btn on" data-tf="1w">1W</button>
    </div>
  </div>

  <div class="tool-row">
    <button class="tool-btn" id="tool-cursor">✥ 커서</button>
    <button class="tool-btn" id="tool-hline">— 수평선</button>
    <button class="tool-btn" id="tool-tline">╱ 추세선</button>
    <button class="tool-btn red" id="tool-clear">✕ 전체삭제</button>
    <span id="div-badge" class="div-badge"></span>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-line" style="background:#ff4444"></div><span style="color:#ff4444">MA7</span></div>
    <div class="leg-item"><div class="leg-line" style="background:#ff8800"></div><span style="color:#ff8800">MA50</span></div>
    <div class="leg-item"><div class="leg-line" style="background:#ffd700"></div><span style="color:#ffd700">MA200</span></div>
    <div class="leg-item"><div class="leg-line" style="background:#888"></div><span style="color:#888">BB</span></div>
  </div>

  <div id="main-chart-container"><div class="loading-chart" id="chart-loading">차트 불러오는 중...</div></div>
  <div id="vol-chart-container" style="display:none"></div>
  <div id="rsi-chart-container" style="display:none">
    <div class="rsi-label">RSI (14)</div>
  </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
var rows = [];
var fMode = 'hl';
var sKey = 'hl';
var sDir = -1;
var currentSym = '';
var currentTf = '1w';
var mainChart = null;
var volChart = null;
var rsiChart = null;
var activeTool = 'cursor';
var trendLinePoints = [];
var drawnLines = [];

/* ---- SCANNER ---- */
function setFilter(m) {
  fMode = m;
  document.getElementById('btn-hl').className = (m === 'hl') ? 'btn on' : 'btn';
  document.getElementById('btn-trend').className = (m === 'trend') ? 'btn on' : 'btn';
  document.getElementById('btn-all').className = (m === 'all') ? 'btn on' : 'btn';
  render();
}

function sortBy(k) {
  if (sKey === k) { sDir = sDir * -1; } else { sKey = k; sDir = -1; }
  render();
}

function setProgress(pct) {
  document.getElementById('prog').style.width = pct + '%';
}

function fmtPrice(n) {
  if (n < 0.0001) return n.toFixed(7);
  if (n < 0.01) return n.toFixed(5);
  if (n < 1) return n.toFixed(4);
  if (n < 100) return n.toFixed(2);
  return Math.round(n).toLocaleString();
}

function fmtVol(n) {
  if (n >= 1000000000) return '$' + (n / 1000000000).toFixed(1) + 'B';
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(0) + 'M';
  return '$' + (n / 1000).toFixed(0) + 'K';
}

function load() {
  var tf = document.getElementById('tf').value;
  var minVolM = parseFloat(document.getElementById('minvol').value) * 1000000;
  var st = document.getElementById('st');
  st.className = 'status loading';
  st.textContent = '바이낸스 API 연결 중...';
  document.getElementById('tb').innerHTML = '<tr><td colspan="7" class="empty">로딩 중...</td></tr>';
  setProgress(5);

  fetch('https://api.binance.com/api/v3/ticker/24hr')
    .then(function(r) { return r.json(); })
    .then(function(tickers) {
      setProgress(20);
      var skip = ['DOWN','UP','BEAR','BULL','TUSD','USDC','BUSD','DAI','FDUSD','USDP'];
      var pool = tickers.filter(function(t) {
        var sym = t.symbol;
        if (!sym.endsWith('USDT')) return false;
        for (var i = 0; i < skip.length; i++) { if (sym.indexOf(skip[i]) >= 0) return false; }
        return parseFloat(t.quoteVolume) >= minVolM;
      });
      pool.sort(function(a, b) { return parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume); });
      pool = pool.slice(0, 80);
      st.textContent = pool.length + '개 종목 분석 중...';
      var results = [];
      var idx = 0;

      function nextBatch() {
        if (idx >= pool.length) {
          rows = results;
          document.getElementById('m1').textContent = rows.length;
          document.getElementById('m2').textContent = rows.filter(function(d) { return d.hl === 2; }).length;
          document.getElementById('m3').textContent = rows.filter(function(d) { return d.strong; }).length;
          document.getElementById('m4').textContent = rows.filter(function(d) { return d.vSpike; }).length;
          document.getElementById('m5').textContent = new Date().toLocaleTimeString('ko-KR');
          setProgress(100);
          setTimeout(function() { setProgress(0); }, 800);
          var tfLabels = {'1w':'주봉','1M':'월봉','3d':'3일봉','1d':'일봉'};
          var tfLabel = tfLabels[tf] || tf;
          st.className = 'status';
          st.textContent = rows.length + '개 완료 · ' + tfLabel + ' · HH·HL: ' + rows.filter(function(d) { return d.hl === 2; }).length + '개';
          render();
          return;
        }
        var batch = pool.slice(idx, idx + 8);
        idx += 8;
        setProgress(20 + Math.round((idx / pool.length) * 75));
        st.textContent = Math.min(idx, pool.length) + '/' + pool.length + ' 분석 중...';
        var promises = batch.map(function(t) {
          return fetch('https://api.binance.com/api/v3/klines?symbol=' + t.symbol + '&interval=' + tf + '&limit=12')
            .then(function(r) { return r.json(); })
            .then(function(kl) {
              if (!kl || kl.length < 6) return null;
              var hi = kl.map(function(k) { return parseFloat(k[2]); });
              var lo = kl.map(function(k) { return parseFloat(k[3]); });
              var cl = kl.map(function(k) { return parseFloat(k[4]); });
              var vl = kl.map(function(k) { return parseFloat(k[5]); });
              var n = cl.length;
              var hh = hi[n-1] > hi[n-2] && hi[n-2] > hi[n-3];
              var hl = lo[n-1] > lo[n-2] && lo[n-2] > lo[n-3];
              var hlScore = (hh ? 1 : 0) + (hl ? 1 : 0);
              var sum6 = 0;
              for (var i = n-6; i < n; i++) sum6 += cl[i];
              var ma6 = sum6 / 6;
              var isUp = cl[n-1] > cl[n-4] && cl[n-4] > cl[n-7];
              var aboveMA = cl[n-1] > ma6;
              var trend = (isUp ? 1 : 0) + (aboveMA ? 1 : 0);
              var vSum = 0;
              for (var j = 0; j < vl.length - 1; j++) vSum += vl[j];
              var vAvg = vSum / (vl.length - 1);
              var vSpike = vl[n-1] > vAvg * 1.5;
              return {
                sym: t.symbol.replace('USDT',''),
                price: parseFloat(t.lastPrice),
                chg: parseFloat(t.priceChangePercent),
                hl: hlScore, trend: trend,
                vol: parseFloat(t.quoteVolume),
                vSpike: vSpike, strong: hlScore === 2 && trend === 2
              };
            }).catch(function() { return null; });
        });
        Promise.all(promises).then(function(res) {
          for (var i = 0; i < res.length; i++) { if (res[i]) results.push(res[i]); }
          setTimeout(nextBatch, 100);
        });
      }
      nextBatch();
    })
    .catch(function(e) {
      st.className = 'status err';
      st.textContent = '오류: ' + e.message;
      document.getElementById('tb').innerHTML = '<tr><td colspan="7" class="empty">로딩 실패</td></tr>';
      setProgress(0);
    });
}

function render() {
  var data = [];
  for (var i = 0; i < rows.length; i++) data.push(rows[i]);
  if (fMode === 'hl') data = data.filter(function(d) { return d.hl === 2; });
  else if (fMode === 'trend') data = data.filter(function(d) { return d.trend === 2 && d.hl >= 1; });
  data.sort(function(a, b) {
    var av = a[sKey]; var bv = b[sKey];
    if (sKey === 'sym') return sDir * av.localeCompare(bv);
    return sDir * (av - bv);
  });
  var tb = document.getElementById('tb');
  if (!data.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">조건에 맞는 종목 없음</td></tr>'; return; }
  var html = '';
  var shown = data.slice(0, 60);
  for (var i = 0; i < shown.length; i++) {
    var d = shown[i];
    var cc = d.chg >= 0 ? 'up' : 'dn';
    var sign = d.chg >= 0 ? '+' : '';
    var hlPill = d.hl === 2 ? '<span class="pill pg">HH·HL</span>' : (d.hl === 1 ? '<span class="pill py">부분</span>' : '<span class="pill pr">미충족</span>');
    var trPill = d.trend === 2 ? '<span class="pill pg">강세</span>' : (d.trend === 1 ? '<span class="pill py">중립</span>' : '<span class="pill pr">약세</span>');
    var sigs = '';
    if (d.strong) sigs += '<span class="tag tag-hot">강력</span>';
    if (d.vSpike) sigs += '<span class="tag">거래량↑</span>';
    html += '<tr><td><span class="sym-link" data-sym="' + d.sym + '">' + d.sym + '</span></td>';
    html += '<td class="neu">' + fmtPrice(d.price) + '</td>';
    html += '<td class="' + cc + '">' + sign + d.chg.toFixed(2) + '%</td>';
    html += '<td>' + hlPill + '</td><td>' + trPill + '</td>';
    html += '<td class="neu">' + fmtVol(d.vol) + '</td>';
    html += '<td>' + (sigs || '<span class="neu">-</span>') + '</td></tr>';
  }
  tb.innerHTML = html;
  var links = document.querySelectorAll('.sym-link');
  for (var j = 0; j < links.length; j++) {
    (function(el) {
      el.addEventListener('click', function() { openChart(el.getAttribute('data-sym')); });
    })(links[j]);
  }
}

/* ---- CHART ---- */
function calcMA(arr, period) {
  var result = [];
  for (var i = 0; i < arr.length; i++) {
    if (i < period - 1) { result.push(null); continue; }
    var sum = 0;
    for (var j = i - period + 1; j <= i; j++) sum += arr[j];
    result.push(sum / period);
  }
  return result;
}

function calcBB(arr, period, mult) {
  var mid = calcMA(arr, period);
  var upper = []; var lower = [];
  for (var i = 0; i < arr.length; i++) {
    if (mid[i] === null) { upper.push(null); lower.push(null); continue; }
    var sum2 = 0;
    for (var j = i - period + 1; j <= i; j++) sum2 += Math.pow(arr[j] - mid[i], 2);
    var std = Math.sqrt(sum2 / period);
    upper.push(mid[i] + mult * std);
    lower.push(mid[i] - mult * std);
  }
  return { mid: mid, upper: upper, lower: lower };
}

function calcRSI(arr, period) {
  var result = [];
  if (arr.length < period + 1) return result;
  var gains = 0; var losses = 0;
  for (var i = 1; i <= period; i++) {
    var diff = arr[i] - arr[i-1];
    if (diff > 0) gains += diff; else losses -= diff;
  }
  var avgGain = gains / period; var avgLoss = losses / period;
  for (var k = 0; k < period; k++) result.push(null);
  result.push(100 - 100 / (1 + (avgLoss === 0 ? 100 : avgGain / avgLoss)));
  for (var i = period + 1; i < arr.length; i++) {
    var diff = arr[i] - arr[i-1];
    var g = diff > 0 ? diff : 0; var l = diff < 0 ? -diff : 0;
    avgGain = (avgGain * (period-1) + g) / period;
    avgLoss = (avgLoss * (period-1) + l) / period;
    result.push(100 - 100 / (1 + (avgLoss === 0 ? 100 : avgGain / avgLoss)));
  }
  return result;
}

function detectDiv(closes, rsi, lb) {
  var n = closes.length;
  if (n < lb + 1) return null;
  var rc = closes[n-1]; var pc = closes[n-1-lb];
  var rr = rsi[n-1]; var pr = rsi[n-1-lb];
  if (rr === null || pr === null) return null;
  if (rc < pc && rr > pr) return 'bull';
  if (rc > pc && rr < pr) return 'bear';
  return null;
}

function destroyCharts() {
  if (mainChart) { try { mainChart.remove(); } catch(e) {} mainChart = null; }
  if (volChart) { try { volChart.remove(); } catch(e) {} volChart = null; }
  if (rsiChart) { try { rsiChart.remove(); } catch(e) {} rsiChart = null; }
  drawnLines = [];
  trendLinePoints = [];
}

function openChart(sym) {
  currentSym = sym;
  currentTf = '1w';
  document.getElementById('scanner-view').style.display = 'none';
  document.getElementById('chart-view').style.display = 'block';
  document.getElementById('c-sym').textContent = sym + '/USDT';
  var row = null;
  for (var i = 0; i < rows.length; i++) { if (rows[i].sym === sym) { row = rows[i]; break; } }
  if (row) {
    document.getElementById('c-price').textContent = fmtPrice(row.price);
    var chgEl = document.getElementById('c-chg');
    chgEl.textContent = (row.chg >= 0 ? '+' : '') + row.chg.toFixed(2) + '%';
    chgEl.className = 'chart-chg ' + (row.chg >= 0 ? 'up' : 'dn');
  }
  var tfBtns = document.querySelectorAll('.tf-btn');
  for (var j = 0; j < tfBtns.length; j++) {
    tfBtns[j].className = tfBtns[j].getAttribute('data-tf') === '1w' ? 'tf-btn on' : 'tf-btn';
  }
  setActiveTool('cursor');
  loadChart(sym, '1w');
}

function loadChart(sym, tf) {
  currentTf = tf;
  destroyCharts();
  document.getElementById('chart-loading').style.display = 'block';
  document.getElementById('chart-loading').textContent = '차트 불러오는 중...';
  document.getElementById('vol-chart-container').style.display = 'none';
  document.getElementById('rsi-chart-container').style.display = 'none';

  fetch('https://api.binance.com/api/v3/klines?symbol=' + sym + 'USDT&interval=' + tf + '&limit=300')
    .then(function(r) { return r.json(); })
    .then(function(klines) {
      document.getElementById('chart-loading').style.display = 'none';
      document.getElementById('vol-chart-container').style.display = 'block';
      document.getElementById('rsi-chart-container').style.display = 'block';
      buildCharts(klines);
    })
    .catch(function(e) {
      document.getElementById('chart-loading').textContent = '오류: ' + e.message;
    });
}

function buildCharts(klines) {
  var W = document.getElementById('main-chart-container').clientWidth || window.innerWidth - 40;
  var closes = klines.map(function(k) { return parseFloat(k[4]); });
  var ma7 = calcMA(closes, 7);
  var ma50 = calcMA(closes, 50);
  var ma200 = calcMA(closes, 200);
  var bb = calcBB(closes, 20, 2);
  var rsi = calcRSI(closes, 14);
  var div = detectDiv(closes, rsi, 20);

  var badge = document.getElementById('div-badge');
  if (div === 'bull') {
    badge.style.display = 'inline-block'; badge.className = 'div-badge div-bull';
    badge.textContent = '▲ 상승 다이버전스';
  } else if (div === 'bear') {
    badge.style.display = 'inline-block'; badge.className = 'div-badge div-bear';
    badge.textContent = '▼ 하락 다이버전스';
  } else { badge.style.display = 'none'; }

  var chartOpts = {
    layout: { background: { color: '#111118' }, textColor: '#6b6b80' },
    grid: { vertLines: { color: 'rgba(255,255,255,0.04)' }, horzLines: { color: 'rgba(255,255,255,0.04)' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal, vertLine: { color: '#444', labelBackgroundColor: '#222' }, horzLine: { color: '#444', labelBackgroundColor: '#222' } },
    rightPriceScale: { borderColor: '#222230', textColor: '#6b6b80' },
    timeScale: { borderColor: '#222230', textColor: '#6b6b80', timeVisible: true },
    handleScroll: true, handleScale: true,
    width: W, height: 420
  };

  mainChart = LightweightCharts.createChart(document.getElementById('main-chart-container'), chartOpts);

  var candleSeries = mainChart.addCandlestickSeries({
    upColor: '#00f5a0', downColor: '#ff4d6a',
    borderUpColor: '#00f5a0', borderDownColor: '#ff4d6a',
    wickUpColor: '#00f5a0', wickDownColor: '#ff4d6a'
  });

  var candleData = klines.map(function(k) {
    return { time: Math.floor(k[0] / 1000), open: parseFloat(k[1]), high: parseFloat(k[2]), low: parseFloat(k[3]), close: parseFloat(k[4]) };
  });
  candleSeries.setData(candleData);

  function addLine(data, color, lw) {
    var s = mainChart.addLineSeries({ color: color, lineWidth: lw, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
    var d = [];
    for (var i = 0; i < klines.length; i++) {
      if (data[i] !== null) d.push({ time: Math.floor(klines[i][0]/1000), value: data[i] });
    }
    s.setData(d);
    return s;
  }

  addLine(bb.upper, 'rgba(140,140,140,0.45)', 1);
  addLine(bb.lower, 'rgba(140,140,140,0.45)', 1);
  addLine(bb.mid, 'rgba(140,140,140,0.3)', 1);
  addLine(ma200, '#ffd700', 1.5);
  addLine(ma50, '#ff8800', 1.5);
  addLine(ma7, '#ff4444', 1.5);

  /* VOL CHART */
  var volOpts = JSON.parse(JSON.stringify(chartOpts));
  volOpts.height = 100;
  volOpts.timeScale = { visible: false, borderColor: '#222230' };
  volChart = LightweightCharts.createChart(document.getElementById('vol-chart-container'), volOpts);
  var volSeries = volChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: '' });
  volChart.priceScale('').applyOptions({ scaleMargins: { top: 0.1, bottom: 0 } });
  var volData = klines.map(function(k, i) {
    var isUp = parseFloat(k[4]) >= parseFloat(k[1]);
    return { time: Math.floor(k[0]/1000), value: parseFloat(k[5]), color: isUp ? 'rgba(0,245,160,0.5)' : 'rgba(255,77,106,0.5)' };
  });
  volSeries.setData(volData);

  /* RSI CHART */
  var rsiOpts = JSON.parse(JSON.stringify(chartOpts));
  rsiOpts.height = 120;
  rsiOpts.timeScale = { visible: false, borderColor: '#222230' };
  rsiChart = LightweightCharts.createChart(document.getElementById('rsi-chart-container'), rsiOpts);

  var rsiSeries = rsiChart.addLineSeries({ lineWidth: 1.5, priceLineVisible: false, lastValueVisible: true, color: '#00c8ff' });
  var rsiData = [];
  for (var i = 0; i < klines.length; i++) {
    if (rsi[i] !== null) rsiData.push({ time: Math.floor(klines[i][0]/1000), value: rsi[i] });
  }
  rsiSeries.setData(rsiData);

  rsiChart.addLineSeries({ color: 'rgba(255,77,106,0.3)', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }).setData(
    klines.map(function(k) { return { time: Math.floor(k[0]/1000), value: 70 }; })
  );
  rsiChart.addLineSeries({ color: 'rgba(0,245,160,0.3)', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }).setData(
    klines.map(function(k) { return { time: Math.floor(k[0]/1000), value: 30 }; })
  );
  rsiChart.addLineSeries({ color: 'rgba(255,255,255,0.1)', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }).setData(
    klines.map(function(k) { return { time: Math.floor(k[0]/1000), value: 50 }; })
  );

  /* sync time scales */
  mainChart.timeScale().subscribeVisibleLogicalRangeChange(function(range) {
    if (range) { volChart.timeScale().setVisibleLogicalRange(range); rsiChart.timeScale().setVisibleLogicalRange(range); }
  });
  volChart.timeScale().subscribeVisibleLogicalRangeChange(function(range) {
    if (range) { mainChart.timeScale().setVisibleLogicalRange(range); rsiChart.timeScale().setVisibleLogicalRange(range); }
  });

  /* DRAWING TOOLS */
  var mainEl = document.getElementById('main-chart-container');
  mainEl.addEventListener('click', function(e) {
    if (activeTool === 'hline') {
      var rect = mainEl.getBoundingClientRect();
      var y = e.clientY - rect.top;
      var price = mainChart.priceScale('right').coordinateToPrice(y);
      if (price) {
        var line = candleSeries.createPriceLine({ price: price, color: '#00c8ff', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true });
        drawnLines.push(line);
      }
    } else if (activeTool === 'tline') {
      var rect = mainEl.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      var price = mainChart.priceScale('right').coordinateToPrice(y);
      var time = mainChart.timeScale().coordinateToTime(x);
      if (price && time) {
        trendLinePoints.push({ time: time, value: price });
        if (trendLinePoints.length === 2) {
          var pts = trendLinePoints.slice();
          pts.sort(function(a,b) { return a.time - b.time; });
          var tSeries = mainChart.addLineSeries({ color: '#ffd700', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
          tSeries.setData(pts);
          drawnLines.push(tSeries);
          trendLinePoints = [];
        }
      }
    }
  });
}

function setActiveTool(tool) {
  activeTool = tool;
  var btns = ['cursor','hline','tline'];
  for (var i = 0; i < btns.length; i++) {
    document.getElementById('tool-' + btns[i]).className = (btns[i] === tool) ? 'tool-btn on' : 'tool-btn';
  }
  var mainEl = document.getElementById('main-chart-container');
  if (tool === 'cursor') mainEl.style.cursor = 'default';
  else if (tool === 'hline') mainEl.style.cursor = 'crosshair';
  else if (tool === 'tline') mainEl.style.cursor = 'crosshair';
}

/* ---- EVENTS ---- */
document.getElementById('btn-hl').addEventListener('click', function() { setFilter('hl'); });
document.getElementById('btn-trend').addEventListener('click', function() { setFilter('trend'); });
document.getElementById('btn-all').addEventListener('click', function() { setFilter('all'); });
document.getElementById('btn-refresh').addEventListener('click', function() { load(); });
document.getElementById('back-btn').addEventListener('click', function() {
  destroyCharts();
  document.getElementById('chart-view').style.display = 'none';
  document.getElementById('scanner-view').style.display = 'block';
});
document.getElementById('tool-cursor').addEventListener('click', function() { setActiveTool('cursor'); });
document.getElementById('tool-hline').addEventListener('click', function() { setActiveTool('hline'); });
document.getElementById('tool-tline').addEventListener('click', function() { setActiveTool('tline'); });
document.getElementById('tool-clear').addEventListener('click', function() {
  for (var i = 0; i < drawnLines.length; i++) {
    try { mainChart.removeSeries(drawnLines[i]); } catch(e) {}
    try { mainChart.removePriceLine(drawnLines[i]); } catch(e) {}
  }
  drawnLines = []; trendLinePoints = [];
});

var ths = document.querySelectorAll('th[data-key]');
for (var i = 0; i < ths.length; i++) {
  (function(th) { th.addEventListener('click', function() { sortBy(th.getAttribute('data-key')); }); })(ths[i]);
}

var tfBtns = document.querySelectorAll('.tf-btn');
for (var i = 0; i < tfBtns.length; i++) {
  (function(btn) {
    btn.addEventListener('click', function() {
      var tf = btn.getAttribute('data-tf');
      var all = document.querySelectorAll('.tf-btn');
      for (var j = 0; j < all.length; j++) all[j].className = 'tf-btn';
      btn.className = 'tf-btn on';
      loadChart(currentSym, tf);
    });
  })(tfBtns[i]);
}

window.addEventListener('resize', function() {
  if (mainChart) mainChart.applyOptions({ width: document.getElementById('main-chart-container').clientWidth });
  if (volChart) volChart.applyOptions({ width: document.getElementById('vol-chart-container').clientWidth });
  if (rsiChart) rsiChart.applyOptions({ width: document.getElementById('rsi-chart-container').clientWidth });
});

load();
</script>
</body>
</html>
