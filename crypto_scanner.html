<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Trend Scanner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f;
  color: #e8e8f0;
  font-family: monospace;
  min-height: 100vh;
  padding: 20px;
}
h1 { color: #00f5a0; font-size: 20px; margin-bottom: 4px; }
.sub { color: #6b6b80; font-size: 11px; margin-bottom: 20px; }
.controls {
  display: flex; flex-wrap: wrap; gap: 10px;
  align-items: center; margin-bottom: 16px;
  background: #111118; border: 1px solid #222230;
  padding: 12px 16px; border-radius: 10px;
}
label { font-size: 11px; color: #6b6b80; margin-right: 4px; }
select {
  background: #1a1a24; border: 1px solid #2a2a3a;
  color: #e8e8f0; font-family: monospace; font-size: 12px;
  padding: 5px 8px; border-radius: 6px; cursor: pointer; outline: none;
}
.btn {
  font-family: monospace; font-size: 11px;
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid #2a2a3a; background: transparent;
  color: #6b6b80; cursor: pointer;
}
.btn:hover { color: #e8e8f0; border-color: #e8e8f0; }
.btn.on { background: rgba(0,245,160,0.1); color: #00f5a0; border-color: #00f5a0; }
.refresh {
  font-family: monospace; font-size: 12px;
  padding: 6px 16px; border-radius: 6px;
  border: 1px solid #00f5a0; background: rgba(0,245,160,0.08);
  color: #00f5a0; cursor: pointer; margin-left: auto;
}
.refresh:hover { background: rgba(0,245,160,0.18); }
.metrics {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
  gap: 10px; margin-bottom: 16px;
}
.mc {
  background: #111118; border: 1px solid #222230;
  border-radius: 10px; padding: 12px 14px;
}
.mc-l { font-size: 10px; color: #6b6b80; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.mc-v { font-size: 24px; font-weight: bold; color: #e8e8f0; }
.mc-v.green { color: #00f5a0; }
.mc-v.sm { font-size: 12px; }
.prog-wrap { height: 2px; background: #1a1a24; border-radius: 2px; margin-bottom: 10px; }
.prog { height: 100%; width: 0%; background: linear-gradient(90deg,#00f5a0,#00c8ff); border-radius: 2px; transition: width 0.3s; }
.status { font-size: 11px; color: #6b6b80; margin-bottom: 12px; }
.status.loading { color: #00f5a0; }
.status.err { color: #ff4d6a; }
.table-wrap {
  background: #111118; border: 1px solid #222230;
  border-radius: 10px; overflow: hidden; overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
thead { background: #1a1a24; }
th {
  text-align: left; padding: 10px 14px;
  font-size: 10px; color: #6b6b80;
  text-transform: uppercase; letter-spacing: 1px;
  cursor: pointer; white-space: nowrap;
  border-bottom: 1px solid #222230;
  user-select: none;
}
th:hover { color: #00f5a0; }
th.active { color: #00f5a0; }
td { padding: 9px 14px; border-bottom: 1px solid #1a1a24; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.sym { font-weight: bold; font-size: 13px; color: #e8e8f0; }
.up { color: #00f5a0; }
.dn { color: #ff4d6a; }
.neu { color: #6b6b80; }
.pill {
  display: inline-block; font-size: 10px;
  padding: 2px 8px; border-radius: 99px; font-weight: bold;
}
.g { background: rgba(0,245,160,0.12); color: #00f5a0; border: 1px solid rgba(0,245,160,0.3); }
.y { background: rgba(255,209,102,0.1); color: #ffd166; border: 1px solid rgba(255,209,102,0.3); }
.r { background: rgba(255,77,106,0.1); color: #ff4d6a; border: 1px solid rgba(255,77,106,0.3); }
.tag {
  display: inline-block; font-size: 9px;
  padding: 1px 6px; border-radius: 99px; margin-left: 3px;
  background: rgba(0,200,255,0.1); color: #00c8ff;
  border: 1px solid rgba(0,200,255,0.25);
}
.tag-hot { background: rgba(255,77,106,0.1); color: #ff4d6a; border-color: rgba(255,77,106,0.3); }
.empty { text-align: center; padding: 40px; color: #6b6b80; }
</style>
</head>
<body>

<h1>TREND SCAN</h1>
<div class="sub">HH · HL Scanner — Binance Live</div>

<div class="controls">
  <label>타임프레임</label>
  <select id="tf">
    <option value="1w">주봉 (1W)</option>
    <option value="1M">월봉 (1M)</option>
    <option value="3d">3일봉</option>
    <option value="1d">일봉 (1D)</option>
  </select>

  <label>최소거래량</label>
  <select id="minvol">
    <option value="100">$100M+</option>
    <option value="50" selected>$50M+</option>
    <option value="10">$10M+</option>
    <option value="1">$1M+</option>
  </select>

  <label>필터</label>
  <button class="btn on" id="btn-hl">HH·HL</button>
  <button class="btn" id="btn-trend">추세만</button>
  <button class="btn" id="btn-all">전체</button>

  <button class="refresh" id="btn-refresh">↻ 새로고침</button>
</div>

<div class="metrics">
  <div class="mc"><div class="mc-l">스캔 종목</div><div class="mc-v" id="m1">—</div></div>
  <div class="mc"><div class="mc-l">HH·HL 충족</div><div class="mc-v green" id="m2">—</div></div>
  <div class="mc"><div class="mc-l">강한 추세</div><div class="mc-v" id="m3">—</div></div>
  <div class="mc"><div class="mc-l">거래량 스파이크</div><div class="mc-v" id="m4">—</div></div>
  <div class="mc"><div class="mc-l">업데이트</div><div class="mc-v sm" id="m5">—</div></div>
</div>

<div class="prog-wrap"><div class="prog" id="prog"></div></div>
<div class="status" id="st">데이터 불러오는 중...</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-key="sym">종목</th>
        <th data-key="price">현재가</th>
        <th data-key="chg">24h 등락</th>
        <th data-key="hl">HH·HL</th>
        <th data-key="trend">추세</th>
        <th data-key="vol">24h 거래량</th>
        <th>신호</th>
      </tr>
    </thead>
    <tbody id="tb"></tbody>
  </table>
</div>

<script>
var rows = [];
var fMode = 'hl';
var sKey = 'hl';
var sDir = -1;

function setFilter(m) {
  fMode = m;
  document.getElementById('btn-hl').className = m === 'hl' ? 'btn on' : 'btn';
  document.getElementById('btn-trend').className = m === 'trend' ? 'btn on' : 'btn';
  document.getElementById('btn-all').className = m === 'all' ? 'btn on' : 'btn';
  render();
}

function sortBy(k) {
  if (sKey === k) sDir *= -1; else { sKey = k; sDir = -1; }
  document.querySelectorAll('th').forEach(function(th) {
    th.className = th.getAttribute('data-key') === k ? 'active' : '';
  });
  render();
}

function setProgress(pct) {
  document.getElementById('prog').style.width = pct + '%';
}

function fmtPrice(n) {
  if (n < 0.000001) return n.toExponential(3);
  if (n < 0.0001) return n.toFixed(7);
  if (n < 0.01) return n.toFixed(5);
  if (n < 1) return n.toFixed(4);
  if (n < 100) return n.toFixed(2);
  return Math.round(n).toLocaleString();
}

function fmtVol(n) {
  if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(0) + 'M';
  return '$' + (n/1e3).toFixed(0) + 'K';
}

function load() {
  var tf = document.getElementById('tf').value;
  var minVolM = parseFloat(document.getElementById('minvol').value) * 1e6;
  var st = document.getElementById('st');
  st.className = 'status loading';
  st.textContent = '바이낸스 API 연결 중...';
  document.getElementById('tb').innerHTML = '<tr><td colspan="7" class="empty">로딩 중...</td></tr>';
  setProgress(5);

  fetch('https://api.binance.com/api/v3/ticker/24hr')
    .then(function(res) { return res.json(); })
    .then(function(tickers) {
      setProgress(20);
      var skip = ['DOWN','UP','BEAR','BULL','TUSD','USDC','BUSD','DAI','FDUSD','USDP'];
      var pool = tickers.filter(function(t) {
        return t.symbol.endsWith('USDT') &&
          !skip.some(function(w) { return t.symbol.indexOf(w) >= 0; }) &&
          parseFloat(t.quoteVolume) >= minVolM;
      }).sort(function(a,b) {
        return parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume);
      }).slice(0, 80);

      st.textContent = pool.length + '개 종목 캔들 분석 중...';
      var results = [];
      var idx = 0;

      function nextBatch() {
        if (idx >= pool.length) {
          rows = results;
          document.getElementById('m1').textContent = rows.length;
          document.getElementById('m2').textContent = rows.filter(function(d) { return d.hl === 2; }).length;
          document.getElementById('m3').textContent = rows.filter(function(d) { return d.strong; }).length;
          document.getElementById('m4').textContent = rows.filter(function(d) { return d.vSpike; }).length;
          document.getElementById('m5').textContent = new Date().toLocaleTimeString('ko-KR');
          setProgress(100);
          setTimeout(function() { setProgress(0); }, 800);
          var tfLabel = {1w:'주봉',1M:'월봉','3d':'3일봉','1d':'일봉'}[tf] || tf;
          st.className = 'status';
          st.textContent = rows.length + '개 분석 완료 · ' + tfLabel + ' 기준 · HH·HL: ' + rows.filter(function(d){return d.hl===2;}).length + '개';
          render();
          return;
        }

        var batch = pool.slice(idx, idx + 8);
        idx += 8;
        setProgress(20 + Math.round((idx / pool.length) * 75));
        st.textContent = Math.min(idx, pool.length) + '/' + pool.length + ' 분석 중...';

        var promises = batch.map(function(t) {
          return fetch('https://api.binance.com/api/v3/klines?symbol=' + t.symbol + '&interval=' + tf + '&limit=12')
            .then(function(r) { return r.json(); })
            .then(function(kl) {
              if (!kl || kl.length < 6) return null;
              var hi = kl.map(function(k) { return parseFloat(k[2]); });
              var lo = kl.map(function(k) { return parseFloat(k[3]); });
              var cl = kl.map(function(k) { return parseFloat(k[4]); });
              var vl = kl.map(function(k) { return parseFloat(k[5]); });
              var n = cl.length;
              var hh = hi[n-1] > hi[n-2] && hi[n-2] > hi[n-3];
              var hl = lo[n-1] > lo[n-2] && lo[n-2] > lo[n-3];
              var hlScore = (hh ? 1 : 0) + (hl ? 1 : 0);
              var sum6 = 0;
              for (var i = n-6; i < n; i++) sum6 += cl[i];
              var ma6 = sum6 / 6;
              var isUp = cl[n-1] > cl[n-4] && cl[n-4] > cl[n-7];
              var aboveMA = cl[n-1] > ma6;
              var trend = (isUp ? 1 : 0) + (aboveMA ? 1 : 0);
              var vSum = 0;
              for (var j = 0; j < vl.length-1; j++) vSum += vl[j];
              var vAvg = vSum / (vl.length - 1);
              var vSpike = vl[n-1] > vAvg * 1.5;
              return {
                sym: t.symbol.replace('USDT',''),
                price: parseFloat(t.lastPrice),
                chg: parseFloat(t.priceChangePercent),
                hl: hlScore, hh: hh, hlfl: hl,
                trend: trend, vol: parseFloat(t.quoteVolume),
                vSpike: vSpike, strong: hlScore === 2 && trend === 2
              };
            }).catch(function() { return null; });
        });

        Promise.all(promises).then(function(res) {
          res.forEach(function(r) { if (r) results.push(r); });
          setTimeout(nextBatch, 100);
        });
      }

      nextBatch();
    })
    .catch(function(e) {
      st.className = 'status err';
      st.textContent = '오류: ' + e.message;
      document.getElementById('tb').innerHTML = '<tr><td colspan="7" class="empty">로딩 실패. 새로고침 눌러주세요.</td></tr>';
      setProgress(0);
    });
}

function render() {
  var data = rows.slice();
  if (fMode === 'hl') data = data.filter(function(d) { return d.hl === 2; });
  if (fMode === 'trend') data = data.filter(function(d) { return d.trend === 2 && d.hl >= 1; });

  data.sort(function(a, b) {
    var av = a[sKey], bv = b[sKey];
    if (sKey === 'sym') return sDir * av.localeCompare(bv);
    return sDir * (av - bv);
  });

  var tb = document.getElementById('tb');
  if (!data.length) {
    tb.innerHTML = '<tr><td colspan="7" class="empty">조건에 맞는 종목 없음</td></tr>';
    return;
  }

  var html = '';
  var shown = data.slice(0, 60);
  for (var i = 0; i < shown.length; i++) {
    var d = shown[i];
    var cc = d.chg >= 0 ? 'up' : 'dn';
    var sign = d.chg >= 0 ? '+' : '';
    var hlPill = d.hl === 2 ? '<span class="pill g">HH·HL</span>' : d.hl === 1 ? '<span class="pill y">부분</span>' : '<span class="pill r">미충족</span>';
    var trPill = d.trend === 2 ? '<span class="pill g">강세</span>' : d.trend === 1 ? '<span class="pill y">중립</span>' : '<span class="pill r">약세</span>';
    var sigs = '';
    if (d.strong) sigs += '<span class="tag tag-hot">강력</span>';
    if (d.vSpike) sigs += '<span class="tag">거래량↑</span>';
    html += '<tr><td><span class="sym">' + d.sym + '</span></td>';
    html += '<td class="neu">' + fmtPrice(d.price) + '</td>';
    html += '<td class="' + cc + '">' + sign + d.chg.toFixed(2) + '%</td>';
    html += '<td>' + hlPill + '</td>';
    html += '<td>' + trPill + '</td>';
    html += '<td class="neu">' + fmtVol(d.vol) + '</td>';
    html += '<td>' + (sigs || '<span class="neu">—</span>') + '</td></tr>';
  }
  tb.innerHTML = html;
}

document.getElementById('btn-hl').addEventListener('click', function() { setFilter('hl'); });
document.getElementById('btn-trend').addEventListener('click', function() { setFilter('trend'); });
document.getElementById('btn-all').addEventListener('click', function() { setFilter('all'); });
document.getElementById('btn-refresh').addEventListener('click', load);
document.querySelectorAll('th[data-key]').forEach(function(th) {
  th.addEventListener('click', function() { sortBy(th.getAttribute('data-key')); });
});

load();
</script>
</body>
</html>
